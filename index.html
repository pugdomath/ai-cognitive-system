<!DOCTYPE html>
<html>
<head>
  <title>AI Cognitive Explorer</title>
  <style>
    body { margin:0; font-family:Arial; text-align:center; }
    .hidden { display:none; }
    button { padding:10px; margin:10px; }

    #panel{
      position:fixed;
      right:0;
      top:0;
      width:260px;
      height:100%;
      background:#f0f0f0;
      padding:15px;
      text-align:left;
    }

    canvas{ background:#f9f9f9; display:block; }

    .card{
      position:fixed;
      top:15%;
      left:50%;
      transform:translateX(-50%);
      background:white;
      padding:20px;
      border:2px solid #333;
      width:360px;
    }
  </style>
</head>

<body>

<!-- SCENE SELECT -->
<div id="home">
  <h1>Explore AI Through Real Problems</h1>

  <button onclick="startScenario('image')">
    🐱 AI says DOG ❌ → Why?
  </button>

  <button onclick="startScenario('text')">
    💬 AI writes nonsense → Why?
  </button>

</div>

<!-- SCENARIO -->
<div id="scenario" class="hidden">
  <h2 id="scenarioText"></h2>
  <button onclick="goGraph()">Investigate</button>
  <button onclick="goHome()">Back</button>
</div>

<!-- GRAPH -->
<canvas id="graph" class="hidden"></canvas>

<!-- PANEL -->
<div id="panel" class="hidden">
  <button onclick="goHome()">← Back to Scenarios</button>

  <h3>🧠 Learning</h3>
  <div id="learned"></div>

  <h4>Next</h4>
  <div id="next"></div>
</div>

<!-- CARD -->
<div id="card" class="card hidden">
  <h3 id="title"></h3>

  <button onclick="setMode('why')">Why</button>
  <button onclick="setMode('how')">How</button>
  <button onclick="setMode('fail')">Failure</button>

  <p id="content"></p>

  <canvas id="demo" width="300" height="200" class="hidden"></canvas>

  <br>
  <label id="lrBox" class="hidden">
    Learning Rate:
    <input type="range" min="0.01" max="1" step="0.01" value="0.1" id="lr">
  </label>

  <button onclick="startGD()" id="runBtn" class="hidden">Run</button>

  <button onclick="closeCard()">Close</button>
</div>

<script>

/* NAVIGATION */

function startScenario(type){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("scenario").classList.remove("hidden");

  let text="";
  if(type==="image") text="AI sees a cat 🐱 but says DOG ❌";
  if(type==="text") text="AI generates meaningless text ❌";

  document.getElementById("scenarioText").innerText=text;
}

function goGraph(){
  document.getElementById("scenario").classList.add("hidden");
  document.getElementById("graph").classList.remove("hidden");
  document.getElementById("panel").classList.remove("hidden");
}

function goHome(){
  document.getElementById("home").classList.remove("hidden");
  document.getElementById("scenario").classList.add("hidden");
  document.getElementById("graph").classList.add("hidden");
  document.getElementById("panel").classList.add("hidden");
}

/* GRAPH DATA */

let nodes=[
  {id:"loss",x:400,y:200,unlocked:true},
  {id:"gradient descent",x:600,y:300,unlocked:true},
  {id:"learning rate",x:300,y:350,unlocked:false}
];

let edges=[
  ["loss","gradient descent"],
  ["learning rate","gradient descent"]
];

let selected=null;

/* CANVAS */

let canvas=document.getElementById("graph");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth-260;
canvas.height=window.innerHeight;

/* DRAW */

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  edges.forEach(e=>{
    let a=get(e[0]),b=get(e[1]);
    if(!a.unlocked||!b.unlocked)return;

    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.strokeStyle="#ccc";
    ctx.stroke();
  });

  nodes.forEach(n=>{
    if(!n.unlocked)return;

    ctx.beginPath();
    ctx.arc(n.x,n.y,25,0,Math.PI*2);
    ctx.fillStyle=(selected===n.id)?"#aaffaa":"#fff";
    ctx.fill();
    ctx.stroke();

    ctx.fillText(n.id,n.x-40,n.y+40);
  });
}

function get(id){return nodes.find(n=>n.id===id);}

/* CLICK */

canvas.addEventListener("click",e=>{
  let rect=canvas.getBoundingClientRect();
  let x=e.clientX-rect.left,y=e.clientY-rect.top;

  nodes.forEach(n=>{
    let dx=x-n.x,dy=y-n.y;
    if(Math.sqrt(dx*dx+dy*dy)<25 && n.unlocked){
      selected=n.id;
      openCard(n.id);

      if(n.id==="gradient descent"){
        unlock("learning rate");
      }
    }
  });

  updatePanel();
  draw();
});

/* PANEL */

function updatePanel(){
  let learned=document.getElementById("learned");
  let next=document.getElementById("next");

  learned.innerHTML="";
  next.innerHTML="";

  nodes.forEach(n=>{
    if(n.unlocked){
      learned.innerHTML+="✔ "+n.id+"<br>";
    }else{
      let btn=document.createElement("button");
      btn.innerText=n.id;
      btn.onclick=()=>{unlock(n.id);updatePanel();draw();}
      next.appendChild(btn);
    }
  });
}

/* UNLOCK */

function unlock(id){
  let node=get(id);
  if(node) node.unlocked=true;
}

/* CARD */

let current=null;

function openCard(id){
  current=id;
  document.getElementById("card").classList.remove("hidden");
  setMode("why");
}

function setMode(mode){
  let c=document.getElementById("content");
  let demo=document.getElementById("demo");
  let lrBox=document.getElementById("lrBox");
  let runBtn=document.getElementById("runBtn");

  demo.classList.add("hidden");
  lrBox.classList.add("hidden");
  runBtn.classList.add("hidden");

  if(current==="loss"){
    if(mode==="why") c.innerText="AI needs a way to measure mistakes.";
    if(mode==="how") c.innerText="Compare prediction vs truth.";
    if(mode==="fail") c.innerText="Bad loss leads to wrong learning.";
  }

  if(current==="gradient descent"){
    if(mode==="why") c.innerText="We need a method to reduce loss.";
    if(mode==="how"){
      c.innerText="Move downhill step by step.";
      demo.classList.remove("hidden");
      lrBox.classList.remove("hidden");
      runBtn.classList.remove("hidden");
      drawGD();
    }
    if(mode==="fail") c.innerText="Too large steps → divergence.";
  }

  if(current==="learning rate"){
    if(mode==="why") c.innerText="Controls learning speed.";
    if(mode==="how") c.innerText="Small = slow, Large = unstable.";
    if(mode==="fail") c.innerText="Too big → overshoot.";
  }
}

function closeCard(){
  document.getElementById("card").classList.add("hidden");
}

/* GD DEMO */

let x=2;
let lr=0.1;
let running=false;

let dcanvas=document.getElementById("demo");
let dctx=dcanvas.getContext("2d");

document.getElementById("lr").oninput=function(){
  lr=parseFloat(this.value);
};

function f(x){ return Math.sin(2*x)+0.3*x*x; }
function grad(x){ return 2*Math.cos(2*x)+0.6*x; }

function drawGD(){
  dctx.clearRect(0,0,300,200);

  dctx.beginPath();
  for(let i=-3;i<3;i+=0.01){
    let px=(i+3)/6*300;
    let py=150 - f(i)*30;
    if(i===-3)dctx.moveTo(px,py);
    else dctx.lineTo(px,py);
  }
  dctx.stroke();

  let px=(x+3)/6*300;
  let py=150 - f(x)*30;

  dctx.beginPath();
  dctx.arc(px,py,5,0,Math.PI*2);
  dctx.fill();
}

function step(){
  if(!running)return;
  x = x - lr * grad(x);
  drawGD();
  requestAnimationFrame(step);
}

function startGD(){
  running=true;
  step();
}

/* INIT */

updatePanel();
draw();

</script>

</body>
</html>
